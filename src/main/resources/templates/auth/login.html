<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Green Diamond Hotel - Đăng nhập</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400" rel="stylesheet"/>

    <style>
        body { font-family: 'Public Sans', sans-serif; background-color: #f8fafc; }

        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            line-height: 1;
            display: inline-block;
            white-space: nowrap;
            -webkit-font-smoothing: antialiased;
        }

        /* Màu xanh dương sáng cho Icon Diamond giống ảnh */
        .logo-icon {
            color: #2563eb !important; /* Blue-600 */
            font-variation-settings: 'FILL' 0, 'wght' 400; /* Nét mảnh, không đổ đặc */
        }

        .input-focus:focus {
            border-color: #1e3a8a !important;
            background-color: white !important;
            ring: 0 !important;
            outline: none !important;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

<header class="w-full border-b border-slate-100 bg-white px-8 py-5 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-3">
        <span class="material-symbols-outlined logo-icon text-[28px]">diamond</span>
        <h2 class="text-[22px] font-bold tracking-tight text-[#1e293b]">Green Diamond Hotel</h2>
    </div>

    <nav class="hidden md:flex items-center">
        <a class="text-[15px] font-semibold text-slate-600 hover:text-blue-600 transition-colors" th:href="@{/}">Trang chủ</a>
    </nav>

    <div class="flex items-center gap-3">
        <a th:href="@{/auth/login}" class="px-5 py-2 text-sm font-bold text-slate-700 border border-slate-200 rounded-xl hover:bg-slate-50 transition-all">Đăng nhập</a>
        <a th:href="@{/auth/register}" class="px-5 py-2 text-sm font-bold text-white bg-[#1e3a8a] rounded-xl hover:bg-[#172554] transition-all">Đăng ký</a>
    </div>
</header>

<main class="flex-1 flex items-center justify-center p-6">
    <div class="w-full max-w-[440px] bg-white rounded-[2.5rem] shadow-sm p-10 border border-slate-100">

        <div class="text-center mb-10">
            <h1 class="text-[32px] font-extrabold text-[#0f172a] mb-2">Đăng nhập</h1>
            <p class="text-slate-400 text-[15px]">Chào mừng bạn trở lại với Green Diamond Hotel</p>
        </div>

        <form th:action="@{/auth/login}" method="post" class="space-y-6">
            <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>

            <div class="space-y-2">
                <label class="text-[14px] font-bold text-slate-800 ml-1">Email</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300">mail</span>
                    <input class="w-full pl-12 pr-4 py-4 bg-[#f8fafd] border border-slate-200 rounded-2xl input-focus transition-all placeholder:text-slate-300"
                           name="email" placeholder="example@email.com" type="email" required/>
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center px-1">
                    <label class="text-[14px] font-bold text-slate-800">Mật khẩu</label>
                    <a class="text-[11px] text-[#1e3a8a] font-bold hover:underline" href="#">Quên mật khẩu?</a>
                </div>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300">lock</span>
                    <input class="w-full pl-12 pr-12 py-4 bg-[#f8fafd] border border-slate-200 rounded-2xl input-focus transition-all placeholder:text-slate-300"
                           id="password" name="password" placeholder="••••••••" type="password" required/>

                    <button class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center justify-center cursor-pointer group"
                            type="button" onclick="togglePassword(this)">
                        <span class="material-symbols-outlined text-slate-300 group-hover:text-[#1e3a8a] transition-colors">visibility</span>
                    </button>
                </div>
            </div>

            <div class="flex items-center gap-2 px-1">
                <input class="w-4 h-4 rounded border-slate-300 text-[#1e3a8a] focus:ring-0" id="remember" name="remember-me" type="checkbox"/>
                <label class="text-[13px] text-slate-500 font-medium cursor-pointer" for="remember">Duy trì đăng nhập</label>
            </div>

            <button class="w-full bg-[#1e3a8a] hover:bg-[#172554] text-white font-bold py-4 rounded-full shadow-lg shadow-blue-900/20 flex items-center justify-center gap-2 transition-all" type="submit">
                <span>Đăng nhập</span>
                <span class="material-symbols-outlined text-[20px]" style="color:white; font-variation-settings: 'wght' 500;">login</span>
            </button>
        </form>

        <div class="mt-10 text-center">
            <p class="text-[13px] text-slate-600 font-medium">
                Chưa có tài khoản?
                <a class="text-[#1e3a8a] font-bold hover:underline ml-1" th:href="@{/auth/register}">Đăng ký ngay</a>
            </p>
        </div>
    </div>
</main>

<script>
    function togglePassword(btn) {
        const input = document.getElementById('password');
        const icon = btn.querySelector('.material-symbols-outlined');
        if (input.type === 'password') {
            input.type = 'text';
            icon.textContent = 'visibility_off';
        } else {
            input.type = 'password';
            icon.textContent = 'visibility';
        }
    }
</script>
</body>
</html>
