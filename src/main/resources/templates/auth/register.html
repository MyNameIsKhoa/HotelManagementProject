<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<div class="container">
    <h2>Đăng ký</h2>

    <div th:if="${error}" class="form-error" th:text="${error}"></div>

    <form th:action="@{/auth/register}" method="post">
        <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>
        <label>
            Họ và tên:
            <input type="text" name="fullName" th:value="${fullName}" />
        </label>
        <br/><br/>
        <label>
            Email:
            <input type="email" name="email" th:value="${email}" required />
        </label>
        <br/><br/>
        <label>
            Mật khẩu:
            <input type="password" name="password" required />
        </label>
        <br/><br/>
        <button type="submit">Đăng ký</button>
    </form>

    <p>
        Đã có tài khoản? <a th:href="@{/auth/login}">Đăng nhập</a>
    </p>
</div>
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
