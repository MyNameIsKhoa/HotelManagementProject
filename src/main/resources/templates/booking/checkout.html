<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Xác nhận đặt phòng | Hotel Management</title>

    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#f8f5f2',
                            dark: '#1a2a6c',
                            accent: '#b2945b',
                        },
                        royal: {
                            500: '#1e3a8a',
                            600: '#1e40af',
                            700: '#1d4ed8',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                }
            }
        }
    </script>
    <style data-purpose="custom-glassmorphism">
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .gradient-button {
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
            transition: all 0.3s ease;
        }
        .gradient-button:hover {
            box-shadow: 0 10px 15px -3px rgba(30, 58, 138, 0.3);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="bg-[#fcfbf9] text-gray-900 font-sans min-h-screen flex flex-col">

<div th:replace="~{fragments/header :: header}"></div>

<main class="flex-grow flex items-center justify-center px-4 py-12 md:py-20 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-brand-light via-white to-white">
    <div class="max-w-xl w-full" data-purpose="checkout-container">

        <div class="glass-card rounded-3xl shadow-2xl overflow-hidden p-8 md:p-12">
            <div class="text-center mb-10">
                <h1 class="font-serif text-3xl md:text-4xl text-gray-800 mb-2">Xác nhận đặt phòng</h1>
                <p class="text-gray-500 text-sm md:text-base">Xem lại thông tin kỳ nghỉ của bạn</p>
            </div>

            <div class="space-y-6 mb-10" data-purpose="booking-details">

                <div class="flex items-start space-x-4">
                    <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center flex-shrink-0">
                        <svg class="h-5 w-5 text-royal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                        </svg>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400 uppercase tracking-widest font-semibold">Loại phòng</p>
                        <p class="text-lg font-medium text-gray-800" th:text="${roomTypeName != null ? roomTypeName : 'Standard Room'}">Luxury Ocean Suite</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="flex items-start space-x-4">
                        <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center flex-shrink-0">
                            <svg class="h-5 w-5 text-royal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                            </svg>
                        </div>
                        <div>
                            <p class="text-xs text-gray-400 uppercase tracking-widest font-semibold">Nhận phòng:</p>
                            <p class="text-base font-medium text-gray-800" th:text="${checkinDate}">Oct 12, 2026</p>
                        </div>
                    </div>

                    <div class="flex items-start space-x-4">
                        <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center flex-shrink-0">
                            <svg class="h-5 w-5 text-royal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                            </svg>
                        </div>
                        <div>
                            <p class="text-xs text-gray-400 uppercase tracking-widest font-semibold">Trả phòng:</p>
                            <p class="text-base font-medium text-gray-800" th:text="${checkoutDate}">Oct 15, 2026</p>
                        </div>
                    </div>
                </div>
                <div class="pt-6 border-t border-gray-100 flex flex-col items-end">

                    <div class="flex justify-between w-full items-center">
                        <span class="text-gray-600 font-medium">Tổng tiền:</span>
                        <span class="text-3xl font-serif font-black text-royal-700"
                              th:text="${#numbers.formatDecimal(totalPrice, 0, 'POINT', 0, 'COMMA') + ' VND'}">
                </span>
                    </div>

                    <p class="text-sm text-gray-500 italic mt-1"
                       th:text="'(' + ${totalPriceText} + ')'">
                    </p>

                    <div class="w-full mt-6 text-center bg-slate-50 py-4 px-2 rounded-xl border border-slate-200">

                        <p class="text-base font-semibold text-gray-800">
                            Vui lòng thanh toán trước (tiền cọc):
                            <span class="text-xl font-bold text-royal-700 ml-1"
                                  th:text="${#numbers.formatDecimal(depositAmount, 0, 'POINT', 0, 'COMMA') + ' VND'}">
                    </span>
                        </p>

                        <p class="text-sm font-medium text-gray-600 italic mt-2">
                            Phần còn lại sẽ được thanh toán tại thời điểm nhận phòng.
                        </p>

                    </div>

                </div>

            <form th:action="@{/booking/create}" method="post" class="space-y-4">

                <input type="hidden" name="roomTypeId" th:value="${roomTypeId}">
                <input type="hidden" name="checkinDate" th:value="${checkinDate}">
                <input type="hidden" name="checkoutDate" th:value="${checkoutDate}">

                <button type="submit"
                        class="gradient-button w-full py-4 rounded-xl text-white font-semibold text-lg tracking-wide uppercase"
                        onclick="this.innerHTML='Đang xử lý...'; this.classList.add('opacity-80', 'cursor-not-allowed');">
                     Xác nhận & Thanh toán
                </button>

                <a th:href="@{/}" class="block text-center text-sm text-gray-400 hover:text-gray-600 transition-colors font-medium">
                    ⬅ Quay lại
                </a>
            </form>

        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<div th:replace="~{fragments/chatbot :: chatbot}"></div>

</body>
</html>
