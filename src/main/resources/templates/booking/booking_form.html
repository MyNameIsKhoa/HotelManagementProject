<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Xác nhận đặt phòng</title>
</head>
<body>

<h2>Xác nhận đặt phòng của bạn</h2>

<div th:if="${errorMessage}" style="color:red">
    <p th:text="${errorMessage}"></p>
</div>

<form th:action="@{/booking/create}" method="post">

    <input type="hidden" name="roomTypeId" th:value="${roomTypeId}">
    <input type="hidden" name="checkinDate" th:value="${checkinDate}">
    <input type="hidden" name="checkoutDate" th:value="${checkoutDate}">

    <p>Nhận phòng: <b th:text="${checkinDate}"></b></p>
    <p>Trả phòng: <b th:text="${checkoutDate}"></b></p>

    <button type="submit">
        Thanh toán cọc & xác nhận
    </button>

</form>

</body>
</html>
