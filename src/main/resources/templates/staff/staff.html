<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bảng điều khiển nhân viên</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">

    <h2 class="mb-4">🛎 Quản Lý Đặt Phòng</h2>

    <!-- ================= LIST BOOKINGS ================= -->
    <div th:if="${booking == null}">

        <table class="table table-bordered table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Khách hàng</th>
                <th>Loại phòng</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="b : ${bookings}">
                <td th:text="${b.bookingId}"></td>
                <td th:text="${b.user.fullName}"></td>
                <td th:text="${b.roomType.name}"></td>
                <td>
                    <span class="badge bg-info"
                          th:text="${b.status}"></span>
                </td>
                <td>
                    <a class="btn btn-sm btn-primary"
                       th:href="@{/staff/{id}(id=${b.bookingId})}">
                        Chi tiết
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

    </div>

    <!-- ================= DETAIL ================= -->
    <div th:if="${booking != null}">

        <a th:href="@{/staff}" class="btn btn-secondary mb-3">⬅ Quay lại</a>

        <h4>📄 Chi Tiết Đặt Phòng</h4>

        <div class="card mb-3">
            <div class="card-body">

                <p><b>ID:</b> <span th:text="${booking.bookingId}"></span></p>

                <p><b>Khách hàng:</b>
                    <span th:text="${booking.user.fullName}"></span>
                </p>

                <p><b>Loại phòng:</b>
                    <span th:text="${booking.roomType.name}"></span>
                </p>

                <p><b>Phòng:</b>
                    <span th:if="${booking.room != null}"
                          class="fw-bold text-success"
                          th:text="${booking.room.roomNumber}">
                    </span>

                    <span th:if="${booking.room == null}"
                          class="text-danger">
                        Chưa phân phòng
                    </span>
                </p>

                <p><b>Trạng thái:</b>
                    <span class="badge bg-warning"
                          th:text="${booking.status}">
                    </span>
                </p>

            </div>
        </div>

        <!-- ================= ASSIGN ROOM ================= -->
        <div th:if="${booking.status.name() != 'PENDING_DEPOSIT'}"
             class="card border-warning mb-3">

            <div class="card-header bg-warning">
                Phân phòng
            </div>

            <div class="card-body">

                <form th:action="@{/staff/{id}/assign-room(id=${booking.bookingId})}"
                      method="post">

                    <select name="roomId"
                            class="form-select mb-3" required>

                        <option value="">-- Chọn phòng --</option>

                        <option th:each="r : ${availableRooms}"
                                th:value="${r.roomId}"
                                th:text="${r.roomNumber}">
                        </option>
                    </select>

                    <button class="btn btn-warning">
                        Xác nhận & Phân phòng
                    </button>
                </form>

            </div>
        </div>

        <!-- ================= CHECK IN ================= -->
        <div th:if="${booking.status.name() == 'CONFIRMED'}">

            <form th:action="@{/staff/{id}/check-in(id=${booking.bookingId})}"
                  method="post">

                <button class="btn btn-success">
                    Nhận phòng cho khách
                </button>

            </form>
        </div>

        <!-- ================= PAY ================= -->
        <div th:if="${booking.status.name() == 'CHECKED_IN'}">

            <a th:href="@{/payment/{id}(id=${booking.bookingId})}"
               class="btn btn-primary">

                Xác nhận thanh toán
            </a>

        </div>


        <!-- ================= CHECK OUT ================= -->
        <div th:if="${booking.status.name() == 'PAID'}">

            <form th:action="@{/staff/{id}/check-out(id=${booking.bookingId})}"
                  method="post">

                <button class="btn btn-danger">
                    Trả phòng
                </button>

            </form>
        </div>

    </div>

</div>

</body>
</html>
