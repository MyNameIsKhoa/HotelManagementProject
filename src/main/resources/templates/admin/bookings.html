<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xem đặt phòng - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/admin"><i class="fas fa-shield-alt me-2"></i>Quản trị Khách sạn</a>
        <div class="navbar-nav ms-auto d-flex flex-row gap-2">
            <a class="nav-link" href="/admin">Tổng quan</a>
            <a class="nav-link" href="/admin/rooms">Phòng</a>
            <a class="nav-link" href="/admin/users">Người dùng</a>
            <a class="nav-link active" href="/admin/bookings">Đặt phòng</a>
            <a class="btn btn-sm btn-outline-light ms-3" href="/auth/logout">Đăng xuất</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card shadow-sm">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="card-title mb-0"><i class="fas fa-calendar-check me-2"></i>Danh sách đặt phòng</h4>
                <span class="badge bg-secondary fs-6" th:text="'Tổng: ' + ${#lists.size(bookings)} + ' đơn'">Tổng: 0 đơn</span>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Khách hàng</th>
                        <th>Loại phòng</th>
                        <th>Phòng</th>
                        <th>Check-in</th>
                        <th>Check-out</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="booking : ${bookings}">
                        <td th:text="'#' + ${booking.bookingId}">#1</td>
                        <td>
                            <div class="fw-bold" th:text="${booking.user.fullName}">Name</div>
                            <small class="text-muted" th:text="${booking.user.email}">email</small>
                        </td>
                        <td>
                            <span th:if="${booking.roomType != null}" class="badge bg-secondary"
                                  th:text="${booking.roomType.name}">Deluxe</span>
                        </td>
                        <td>
                            <span th:if="${booking.room != null}" class="badge bg-info text-dark"
                                  th:text="${booking.room.roomNumber}">D101</span>
                            <span th:if="${booking.room == null}" class="text-muted fst-italic">Chưa gán</span>
                        </td>
                        <td th:text="${#temporals.format(booking.checkinDate, 'dd/MM/yyyy HH:mm')}">...</td>
                        <td th:text="${#temporals.format(booking.checkoutDate, 'dd/MM/yyyy HH:mm')}">...</td>
                        <td th:text="${#numbers.formatDecimal(booking.totalPrice, 0, 'COMMA', 0, 'POINT') + ' ₫'}">0 ₫</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${booking.status.name() == 'PENDING_DEPOSIT' ? 'bg-warning text-dark' :
                                                   (booking.status.name() == 'CONFIRMED' ? 'bg-primary' :
                                                   (booking.status.name() == 'ASSIGNED' ? 'bg-info text-dark' :
                                                   (booking.status.name() == 'CHECKED_IN' ? 'bg-success' :
                                                   (booking.status.name() == 'CHECKED_OUT' ? 'bg-secondary' : 'bg-danger'))))}"
                                  th:text="${booking.status.name() == 'PENDING_DEPOSIT' ? 'Chờ đặt cọc' :
                                            (booking.status.name() == 'CONFIRMED' ? 'Đã xác nhận' :
                                            (booking.status.name() == 'ASSIGNED' ? 'Đã gán phòng' :
                                            (booking.status.name() == 'CHECKED_IN' ? 'Đã nhận phòng' :
                                            (booking.status.name() == 'CHECKED_OUT' ? 'Đã trả phòng' : 'Đã hủy'))))}">
                                Status
                            </span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(bookings)}">
                        <td colspan="8" class="text-center py-4 text-muted">
                            <i class="fas fa-inbox fa-3x mb-3"></i><br>
                            Không có đặt phòng nào.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
