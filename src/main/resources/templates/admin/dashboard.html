w<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị Khách sạn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/admin"><i class="fas fa-shield-alt me-2"></i>Quản trị Khách sạn</a>
        <div class="navbar-nav ms-auto d-flex flex-row gap-2">
            <a class="nav-link" href="/admin"><i class="fas fa-chart-pie me-1"></i>Tổng quan</a>
            <a class="nav-link" href="/admin/rooms"><i class="fas fa-bed me-1"></i>Phòng</a>
            <a class="nav-link" href="/admin/users"><i class="fas fa-users me-1"></i>Người dùng</a>
            <a class="nav-link" href="/admin/bookings"><i class="fas fa-calendar-check me-1"></i>Đặt phòng</a>
            <a class="btn btn-sm btn-outline-light ms-3" href="/auth/logout"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
        </div>
    </div>
</nav>

<div class="container">

    <!-- Summary Cards -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card text-white bg-primary shadow-sm">
                <div class="card-body text-center">
                    <i class="fas fa-bed fa-2x mb-2"></i>
                    <h5 class="card-title">Tổng Phòng</h5>
                    <h2 id="totalRooms" th:text="${summary['totalRooms']}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-success shadow-sm">
                <div class="card-body text-center">
                    <i class="fas fa-calendar-check fa-2x mb-2"></i>
                    <h5 class="card-title">Tổng Đặt phòng</h5>
                    <h2 id="totalBookings" th:text="${summary['totalBookings']}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-warning shadow-sm">
                <div class="card-body text-center">
                    <i class="fas fa-money-bill-wave fa-2x mb-2"></i>
                    <h5 class="card-title">Doanh thu</h5>
                    <h2 id="totalRevenue" class="fs-4"
                        th:text="${#numbers.formatDecimal(summary['totalRevenue'], 0, 'COMMA', 0, 'POINT') + ' ₫'}">0 ₫</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-info shadow-sm">
                <div class="card-body text-center">
                    <i class="fas fa-users fa-2x mb-2"></i>
                    <h5 class="card-title">Người dùng</h5>
                    <h2 id="totalUsers" th:text="${summary['totalUsers']}">0</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts -->
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title text-center"><i class="fas fa-chart-pie me-2"></i>Trạng thái phòng</h5>
                    <canvas id="roomStatusChart" height="300"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title text-center"><i class="fas fa-chart-pie me-2"></i>Cơ cấu doanh thu theo loại phòng</h5>
                    <canvas id="revenueChart" height="300"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Links -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <h5 class="card-title mb-3">Truy cập nhanh</h5>
                    <a href="/admin/rooms" class="btn btn-outline-primary me-2"><i class="fas fa-bed me-1"></i>Quản lý phòng</a>
                    <a href="/admin/users" class="btn btn-outline-success me-2"><i class="fas fa-users me-1"></i>Quản lý người dùng</a>
                    <a href="/admin/bookings" class="btn btn-outline-warning"><i class="fas fa-calendar-check me-1"></i>Xem đặt phòng</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
    const COLORS = ['#28a745', '#dc3545', '#ffc107', '#6c757d', '#17a2b8', '#6610f2'];

    // Pie Chart 1: Trạng thái phòng
    fetch('/admin/api/stats/room-status')
        .then(r => r.json())
        .then(data => {
            new Chart(document.getElementById('roomStatusChart'), {
                type: 'pie',
                data: {
                    labels: data.labels,
                    datasets: [{
                        data: data.data,
                        backgroundColor: COLORS.slice(0, data.labels.length)
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        })
        .catch(() => {
            document.getElementById('roomStatusChart').parentElement.innerHTML +=
                '<p class="text-muted text-center">Không thể tải dữ liệu biểu đồ</p>';
        });

    // Pie Chart 2: Cơ cấu doanh thu
    fetch('/admin/api/stats/revenue')
        .then(r => r.json())
        .then(data => {
            new Chart(document.getElementById('revenueChart'), {
                type: 'pie',
                data: {
                    labels: data.labels,
                    datasets: [{
                        data: data.data,
                        backgroundColor: COLORS.slice(0, data.labels.length)
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' },
                        tooltip: {
                            callbacks: {
                                label: function(ctx) {
                                    let val = ctx.parsed;
                                    return ctx.label + ': ' + new Intl.NumberFormat('vi-VN', {style:'currency',currency:'VND'}).format(val);
                                }
                            }
                        }
                    }
                }
            });
        })
        .catch(() => {
            document.getElementById('revenueChart').parentElement.innerHTML +=
                '<p class="text-muted text-center">Không thể tải dữ liệu biểu đồ</p>';
        });
</script>
</body>
</html>
